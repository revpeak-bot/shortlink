<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Shortlink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080C14;
      --surface:  #0F1623;
      --surface2: #162030;
      --border:   #1E2D42;
      --accent:   #38BDF8;
      --success:  #34D399;
      --error:    #F87171;
      --warning:  #FBBF24;
      --text:     #E2E8F0;
      --muted:    #64748B;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      padding: 0 1rem 4rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(56,189,248,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 0 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
      gap: .75rem;
    }
    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: .9rem;
      color: var(--accent);
      letter-spacing: .1em;
      text-decoration: none;
    }
    .page-title { font-size: 1.3rem; font-weight: 700; }

    /* Login overlay */
    #loginOverlay {
      position: fixed;
      inset: 0;
      background: rgba(8,12,20,.95);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-card h2 { font-size: 1.2rem; margin-bottom: .5rem; }
    .login-card p { color: var(--muted); font-size: .9rem; margin-bottom: 1.5rem; }
    .login-card input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .85rem 1rem;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: .9rem;
      outline: none;
      margin-bottom: .75rem;
    }
    .login-card input:focus { border-color: var(--accent); }
    .login-card button {
      width: 100%;
      padding: .85rem;
      background: var(--accent);
      color: #080C14;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .login-error {
      color: var(--error);
      font-size: .85rem;
      margin-top: .5rem;
      display: none;
    }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
    }
    .stat-label { font-size: .75rem; color: var(--muted); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; margin-bottom: .4rem; }
    .stat-val   { font-family: 'JetBrains Mono', monospace; font-size: 1.6rem; font-weight: 600; color: #fff; }
    .stat-val.accent  { color: var(--accent); }
    .stat-val.success { color: var(--success); }

    /* Controls */
    .controls {
      display: flex;
      gap: .75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-input {
      flex: 1;
      min-width: 180px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: .65rem .9rem;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .9rem;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .btn-refresh {
      padding: .65rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-size: .9rem;
      cursor: pointer;
      transition: border-color .2s;
      white-space: nowrap;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid var(--border); }
    th {
      text-align: left;
      padding: .85rem 1rem;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--muted);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: .9rem 1rem; font-size: .9rem; vertical-align: middle; }

    .code-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: .82rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .25rem .5rem;
      color: var(--accent);
      white-space: nowrap;
    }
    .dest-cell {
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: .85rem;
    }
    .clicks-badge {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      color: var(--success);
    }
    .date-cell { color: var(--muted); font-size: .82rem; white-space: nowrap; }

    /* Action buttons */
    .btn-copy-row, .btn-del {
      padding: .35rem .7rem;
      border-radius: 6px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .2s;
    }
    .btn-copy-row { background: rgba(56,189,248,.12); color: var(--accent); margin-right: .35rem; }
    .btn-del      { background: rgba(248,113,113,.12); color: var(--error); }
    .btn-copy-row:hover, .btn-del:hover { opacity: .75; }

    /* Empty */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty p:first-child { font-size: 2rem; margin-bottom: .5rem; }

    /* Loading */
    .loading-row td { text-align: center; padding: 2.5rem; color: var(--muted); }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto .75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Mobile: hide some columns */
    @media (max-width: 600px) {
      .col-dest, .col-date, .col-title { display: none; }
    }

    footer { text-align: center; margin-top: 2rem; color: var(--muted); font-size: .8rem; }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <a class="logo" href="index.html">⚡ shortlink</a>
    <div class="page-title">📊 Dashboard</div>
    <a href="index.html" style="font-size:.85rem;color:var(--muted);text-decoration:none">+ Buat Tautan</a>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Total Tautan</div>
      <div class="stat-val accent" id="statLinks">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Klik</div>
      <div class="stat-val success" id="statClicks">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Rata-rata Klik</div>
      <div class="stat-val" id="statAvg">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Paling Populer</div>
      <div class="stat-val" id="statTop" style="font-size:.95rem;color:var(--warning)">—</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Cari kode atau URL…" oninput="filterTable()" />
    <button type="button" class="btn-refresh" onclick="loadLinks()">↻ Muat Ulang</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table id="linksTable">
      <thead>
        <tr>
          <th>Kode</th>
          <th class="col-title">Judul</th>
          <th class="col-dest">URL Tujuan</th>
          <th>Klik</th>
          <th class="col-date">Dibuat</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="loading-row"><td colspan="6"><div class="spinner"></div><p>Memuat…</p></td></tr>
      </tbody>
    </table>
  </div>

  <footer>
    <a href="index.html">← Kembali ke Beranda</a>
  </footer>
</div>

<!-- Login overlay -->
<div id="loginOverlay">
  <div class="login-card">
    <p style="font-size:1.5rem;margin-bottom:.5rem">🔐</p>
    <h2>Masuk ke Dashboard</h2>
    <p>Masukkan Admin Key untuk melihat data tautan.</p>
    <input type="password" id="adminKeyInput" placeholder="Admin Key" />
    <button type="button" onclick="doLogin()">Masuk</button>
    <div class="login-error" id="loginError">Kunci salah, coba lagi.</div>
  </div>
</div>

<script>
  // ─────────────────────────────────────────
  const WORKER_URL = 'https://shortlink-api.revpeak2.workers.dev';
  const GO_PAGE    = 'https://shortlink-7hj.pages.dev/go.html';
  // ─────────────────────────────────────────

  const SESSION_KEY = 'sl_admin_key';
  let allLinks = [];
  let adminKey = sessionStorage.getItem(SESSION_KEY) || '';

  function doLogin() {
    const val = document.getElementById('adminKeyInput').value.trim();
    if (!val) return;
    adminKey = val;
    sessionStorage.setItem(SESSION_KEY, val);
    document.getElementById('loginError').style.display = 'none';
    document.getElementById('loginOverlay').style.display = 'none';
    loadLinks();
  }

  document.getElementById('adminKeyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // Jika sudah ada key di session
  if (adminKey) {
    document.getElementById('loginOverlay').style.display = 'none';
    loadLinks();
  }

  async function loadLinks() {
    setLoading();
    try {
      const res = await fetch(`${WORKER_URL}/api/links`, {
        headers: { 'Authorization': `Bearer ${adminKey}` }
      });

      if (res.status === 401) {
        sessionStorage.removeItem(SESSION_KEY);
        adminKey = '';
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('loginError').style.display = 'block';
        setEmpty('Kunci tidak valid.');
        return;
      }

      allLinks = await res.json();
      renderStats(allLinks);
      renderTable(allLinks);
    } catch (e) {
      setEmpty('Gagal memuat data. Periksa koneksi anda.');
    }
  }

  function renderStats(links) {
    const totalClicks = links.reduce((s, l) => s + (l.clicks || 0), 0);
    const avg = links.length ? (totalClicks / links.length).toFixed(1) : 0;
    const top = links.reduce((a, b) => (b.clicks > (a.clicks||0) ? b : a), {});

    document.getElementById('statLinks').textContent  = links.length;
    document.getElementById('statClicks').textContent = totalClicks.toLocaleString();
    document.getElementById('statAvg').textContent    = avg;
    document.getElementById('statTop').textContent    = top.code ? `/${top.code}` : '—';
  }

  function renderTable(links) {
    const tbody = document.getElementById('tableBody');
    if (!links.length) { setEmpty('Belum ada tautan. Buat yang pertama!'); return; }

    tbody.innerHTML = links.map(link => {
      const date = new Date(link.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });
      const goUrl = `${GO_PAGE}?c=${link.code}`;
      return `
        <tr>
          <td><span class="code-badge">${esc(link.code)}</span></td>
          <td class="col-title" style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(link.title || '—')}</td>
          <td class="col-dest"><div class="dest-cell" title="${esc(link.original_url)}">${esc(link.original_url)}</div></td>
          <td><span class="clicks-badge">${(link.clicks||0).toLocaleString()}</span></td>
          <td class="col-date date-cell">${date}</td>
          <td>
            <button type="button" class="btn-copy-row" onclick="copyLink('${esc(goUrl)}', this)">Salin</button>
            <button type="button" class="btn-del" onclick="deleteLink('${esc(link.code)}', this)">Hapus</button>
          </td>
        </tr>`;
    }).join('');
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allLinks.filter(l =>
      l.code.toLowerCase().includes(q) ||
      (l.original_url||'').toLowerCase().includes(q) ||
      (l.title||'').toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  async function deleteLink(code, btn) {
    if (!confirm(`Hapus tautan /${code}?`)) return;
    btn.disabled = true;
    await fetch(`${WORKER_URL}/api/links/${encodeURIComponent(code)}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${adminKey}` }
    });
    allLinks = allLinks.filter(l => l.code !== code);
    renderStats(allLinks);
    renderTable(allLinks);
  }

  function copyLink(url, btn) {
    navigator.clipboard.writeText(url);
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = 'Salin', 1800);
  }

  function setLoading() {
    document.getElementById('tableBody').innerHTML =
      `<tr class="loading-row"><td colspan="6"><div class="spinner"></div><p>Memuat data…</p></td></tr>`;
  }

  function setEmpty(msg) {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="6"><div class="empty"><p>🔗</p><p>${msg}</p></div></td></tr>`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
