    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F4F6FB;
      --white:     #FFFFFF;
      --border:    #E2E8F0;
      --border2:   #CBD5E1;
      --accent:    #2563EB;
      --accent-h:  #1D4ED8;
      --accent-lt: #EFF6FF;
      --success:   #059669;
      --error:     #DC2626;
      --text:      #0F172A;
      --text2:     #475569;
      --text3:     #94A3B8;
      --shadow:    0 1px 3px rgba(0,0,0,.08);
      --shadow-md: 0 4px 20px rgba(0,0,0,.10);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      height: 54px;
      display: flex; align-items: center; justify-content: center;
      position: sticky; top: 0; z-index: 50;
    }
    .nav-logo {
      font-family: 'Outfit', sans-serif;
      font-weight: 800; font-size: 1.1rem;
      color: var(--accent); text-decoration: none;
    }
    .nav-logo span { color: var(--text); }

    /* Step indicator */
    .step-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: .85rem 1rem;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .step-dot {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', sans-serif; font-size: .82rem; font-weight: 700;
      border: 2px solid var(--border2); color: var(--text3); background: var(--white);
      transition: all .35s;
    }
    .step-dot.active { border-color: var(--accent); background: var(--accent); color: #fff; }
    .step-dot.done   { border-color: var(--success); background: var(--success); color: #fff; }
    .step-line {
      flex: 1; max-width: 70px; height: 2px;
      background: var(--border2); border-radius: 2px; transition: background .35s;
    }
    .step-line.done { background: var(--success); }

    .wrap { max-width: 560px; margin: 0 auto; padding: 1.25rem 1rem 4rem; }

    /* ═══════════════════════════════════════════════════════════
       SLOT 3: BANNER 320×50 — di atas halaman
       ═══════════════════════════════════════════════════════════ */
    .ad-320x50 {
      background: var(--white);
      border: 1.5px dashed var(--border2);
      border-radius: 10px;

      margin-bottom: 1.25rem;
      overflow: hidden; position: relative;
    }
    .ad-label {
      position: absolute; top: .3rem; left: .55rem;
      font-size: .62rem; color: var(--text3);
      text-transform: uppercase; letter-spacing: .06em;
    }
    .ad-ph { text-align: center; color: var(--text3); font-size: .78rem; line-height: 1.5; }

    /* Main card */
    .main-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 16px; box-shadow: var(--shadow-md);
      overflow: hidden; margin-bottom: 1.25rem;
    }
    .prog-wrap { height: 5px; background: var(--border); }
    .prog-bar  { height: 100%; background: var(--accent); width: 0%; transition: width 1s linear; }
    .card-body { padding: 1.5rem 1.25rem; }

    /* Destination */
    .dest-box {
      display: flex; align-items: flex-start; gap: .65rem;
      background: var(--accent-lt); border: 1px solid #BFDBFE;
      border-radius: 10px; padding: .85rem; margin-bottom: 1.25rem;
    }
    .dest-ico {
      width: 30px; height: 30px; background: var(--accent); border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: .85rem; flex-shrink: 0;
    }
    .dest-lbl { font-size: .7rem; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .15rem; }
    .dest-url { font-family: 'Outfit', sans-serif; font-size: .88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Countdown */
    .countdown-box {
      display: flex; flex-direction: column;
      align-items: center; gap: .6rem; padding: .75rem 0 1rem;

    .ring-wrap { position: relative; width: 90px; height: 90px; }

    .ring-bg { stroke: var(--border); }

    .ring-num {

      padding: .75rem 0 1rem;

    .scroll-hint {
      font-size: .78rem; color: var(--text3);
      display: flex; align-items: center; gap: .35rem;
      animation: bounce 1.4s ease-in-out infinite;
    }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }

    /* Tombol utama */
    .btn-next {
      display: block; width: 100%;
      padding: 1.15rem 1rem 1.25rem;
      background: var(--accent); color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem; font-weight: 800;

      box-shadow: 0 5px 18px rgba(37,99,235,.35);

      text-align: center;

    .btn-next:active:not(:disabled) { transform: scale(.98); }
    .btn-next:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; box-shadow: none; }
    .btn-sub { text-align: center; font-size: .75rem; color: var(--text3); margin-top: .65rem; }

    /* ═══════════════════════════════════════════════════════════
       SLOT 6: BANNER 320×50 ketiga — di bawah tombol
       ═══════════════════════════════════════════════════════════ */
    .ad-bot {

    /* Loading & Error */
    .state-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem 1.5rem;
      text-align: center; box-shadow: var(--shadow); margin-bottom: 1.25rem;

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-msg { color: var(--text2); font-size: .95rem; margin-bottom: 1rem; }
    .btn-back {
      display: inline-block; padding: .6rem 1.25rem;

    }
    footer { text-align: center; font-size: .78rem; color: var(--text3); margin-top: 1rem; }
    footer a { color: var(--accent); text-decoration: none; }

    @keyframes fadeSlide {
      from { opacity:0; transform:translateX(16px); }
      to   { opacity:1; transform:none; }
    }
    .step-anim { animation: fadeSlide .3s ease; }
  </style>

<script>
  // ══════════════════════════════════════════════
  const WORKER_URL     = 'https://your-worker.workers.dev';
  const COUNTDOWN_SECS = 15;
  const TOTAL_STEPS    = 3;
  // ══════════════════════════════════════════════

  const CIRCUMFERENCE = 2 * Math.PI * 37; // ~232.5

  const code    = new URLSearchParams(location.search).get('c');
  let targetUrl = '';
  let timerH    = null;

  const elLoading      = document.getElementById('stateLoading');
  const elError        = document.getElementById('stateError');
  const elMain         = document.getElementById('stateMain');
  const mainCard       = document.getElementById('mainCard');
  const ringFg         = document.getElementById('ringFg');
  const ringNum        = document.getElementById('ringNum');
  const progBar        = document.getElementById('progBar');
  const btnNext        = document.getElementById('btnNext');
  const btnSec         = document.getElementById('btnSec');
  const btnSub         = document.getElementById('btnSub');
  const stepTitle      = document.getElementById('stepTitle');
  const scrollHintWrap = document.getElementById('scrollHintWrap');
  const dots  = [null, document.getElementById('dot1'), document.getElementById('dot2'), document.getElementById('dot3')];
  const lines = [null, document.getElementById('line1'), document.getElementById('line2')];

  function showError(msg) {
    elLoading.style.display = 'none';
    if (msg) document.getElementById('errMsg').textContent = msg;
    elError.style.display = 'block';
  }

  function updateDots(step) {
    for (let i = 1; i <= TOTAL_STEPS; i++)
      dots[i].className = 'step-dot' + (i < step ? ' done' : i === step ? ' active' : '');
    for (let i = 1; i < TOTAL_STEPS; i++)
      lines[i].className = 'step-line' + (i < step ? ' done' : '');
  }

  function runStep(step) {
    updateDots(step);

    const isLast = (step === TOTAL_STEPS);
    stepTitle.innerHTML = `Langkah <span>${step}</span> dari ${TOTAL_STEPS} — ${isLast ? '🎯 Langkah terakhir!' : 'Harap tunggu'}`;

    // Reset ring & progress bar
    ringFg.style.transition  = 'none';
    progBar.style.transition = 'none';
    ringFg.style.strokeDashoffset = 0;
    progBar.style.width = '0%';
    void ringFg.getBoundingClientRect();
    ringFg.style.transition  = 'stroke-dashoffset .95s linear';
    progBar.style.transition = 'width 1s linear';

    // Animasi slide card
    mainCard.classList.remove('step-anim');
    void mainCard.offsetHeight;
    mainCard.classList.add('step-anim');

    window.scrollTo({ top: 0, behavior: 'smooth' });

    btnNext.disabled    = true;
    btnNext.textContent = `Menghitung… (15)`;
    btnNext.onclick     = null;
    scrollHintWrap.style.display = 'flex';
    btnSub.textContent  = 'Harap tunggu hingga countdown selesai';

    let sec = COUNTDOWN_SECS;
    if (timerH) clearInterval(timerH);

    timerH = setInterval(() => {
      sec--;
      ringNum.textContent = sec;
      btnNext.textContent = `Menghitung… (${sec})`;

      const ratio = (COUNTDOWN_SECS - sec) / COUNTDOWN_SECS;
      ringFg.style.strokeDashoffset = CIRCUMFERENCE * ratio;
      progBar.style.width = (ratio * 100) + '%';

      if (sec <= 0) {
        clearInterval(timerH);
        btnNext.disabled = false;
        scrollHintWrap.style.display = 'none';

        if (isLast) {
          btnNext.textContent = '🎉 Klik untuk Mendapatkan URL Tujuan';
          btnSub.textContent  = 'Anda akan langsung diarahkan ke halaman tujuan';
          btnNext.onclick = () => { window.location.href = targetUrl; };
        } else {
          btnNext.textContent = `Lanjut ke Langkah ${step + 1} dari ${TOTAL_STEPS} →`;
          btnSub.textContent  = `Masih ${TOTAL_STEPS - step} langkah lagi`;
          btnNext.onclick = () => {
            btnNext.disabled    = true;
            btnNext.textContent = 'Memuat langkah berikutnya…';
            runStep(step + 1);
          };
        }

        setTimeout(() => {
          btnNext.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 400);
      }
    }, 1000);
  }

  async function init() {
    if (!code) return showError('Kode tautan tidak ditemukan di URL.');
    try {
      const res  = await fetch(`${WORKER_URL}/api/link/${encodeURIComponent(code)}`);
      const data = await res.json();
      if (!res.ok || !data.original_url) return showError(data.error || 'Tautan tidak ditemukan.');

      targetUrl = data.original_url;
      const u   = new URL(targetUrl);
      document.getElementById('destUrl').textContent =
        u.origin + (u.pathname.length > 32 ? u.pathname.slice(0, 32) + '…' : u.pathname);

      elLoading.style.display = 'none';
      elMain.style.display    = 'block';
      runStep(1);
    } catch {
      showError('Gagal memuat tautan. Periksa koneksi internet anda.');
    }
  }

  init();
</script>
